name: Automated-Build

on:
  workflow_dispatch:
    inputs:
      make_args:
        description: pass extra make argumments to control features not explicitly handled by CI
  push:
  repository_dispatch:
    types: [run_build]

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant_name: "ALL-NO-PSX-NO-DS34"
            ds34: "DS34=0"
            psx_stuff: "DVRP=0 XFROM=0"
          - variant_name: "ALL-NO-PSX-DS34"
            ds34: "DS34=1"
            psx_stuff: "DVRP=0 XFROM=0"
          - variant_name: "ALL-PSX-NO-DS34"
            ds34: "DS34=0"
            psx_stuff: "DVRP=1 XFROM=1"
          - variant_name: "ALL-PSX-DS34"
            ds34: "DS34=1"
            psx_stuff: "DVRP=1 XFROM=1"
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:v1.0
    steps:

    - name: Install dependencies
      run: |
        apk add make git zip

    - uses: actions/checkout@v3
    - run: |
        git config --global --add safe.directory "$GITHUB_WORKSPACE"
        git fetch --prune --unshallow

    - name: Compile wLaunchELF
      run: |
        make rebuild ${{ github.event.inputs.make_args }} ETH=1 MMCE=1 EXFAT=1 MX4SIO=1 ${{ matrix.psx_stuff }} ${{ matrix.ds34 }} DEBUG=0

    - name: Upload variants artifact ELF
      uses: actions/upload-artifact@v4
      with:
        name: "WLE-${{ matrix.variant_name }}"
        path: |
            BOOT*.ELF

####################################################### 
  release:
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
    steps:

    - uses: actions/checkout@v4
    - run: |
        git config --global --add safe.directory "$GITHUB_WORKSPACE"
        git fetch --prune --unshallow

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: WLE/
        pattern: "WLE-*"

    - name: list
      run: |
        ls -R

    - name: Create release
      if: github.ref == 'refs/heads/master'
      uses: marvinpinto/action-automatic-releases@latest
      with:
        repo_token: "${{ secrets.GITHUB_TOKEN }}"
        automatic_release_tag: "latest"
        title: "Latest automated build"
        prerelease: false
        files: |
               WLE/**/*.ELF

    - name: Create release
      if: github.ref == 'refs/heads/master'
      uses: marvinpinto/action-automatic-releases@latest
      with:
        repo_token: "${{ secrets.GITHUB_TOKEN }}"
        automatic_release_tag: "language-files"
        title: "Translations"
        files: |
               Lang/*.LNG

  trigger-auto-update:
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [release]
    strategy:
      matrix:
        include:
          - repo: israpps/FreeMcBoot-Installer
            enabled: false
          - repo: israpps/Funtuna-Fork
            enabled: false
          - repo: israpps/PlayStation2-Basic-BootLoader
            enabled: false
    steps:
    - name: trigger israpps auto-update system
      if: ${{ (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') && matrix.enabled }}
      uses: peter-evans/repository-dispatch@v1
      with:
          token: ${{ secrets.IUS }}
          repository: ${{ matrix.repo }} 
          event-type: Component_update
          client-payload: '{"sha": "${{ github.sha }}"}'
    - name: auto-update disabled for target
      if: ${{ !matrix.enabled }}
      run: echo "Auto-update dispatch disabled for ${{ matrix.repo }}."
