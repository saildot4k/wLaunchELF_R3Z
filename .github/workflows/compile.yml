name: Automated-Build

on:
  workflow_dispatch:
    inputs:
      make_args:
        description: pass extra make argumments to control features not explicitly handled by CI
  push:
  repository_dispatch:
    types: [run_build]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Ensure scripts are executable
      run: |
        chmod +x scripts/stale_code_audit.sh scripts/ci/resolve_make_args.sh
    - name: Run stale code audit
      run: |
        scripts/stale_code_audit.sh build
    - name: Upload stale code report
      uses: actions/upload-artifact@v7
      with:
        name: stale-code-report
        path: build/stale-code-report.txt

  build:
    needs: [audit]
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant_name: "ALL-NO-PSX-NO-DS34"
            psx_profile: "no-psx"
            pad_profile: "no-ds34"
            storage_profile: "all"
          - variant_name: "ALL-NO-PSX-DS34"
            psx_profile: "no-psx"
            pad_profile: "ds34"
            storage_profile: "all"
          - variant_name: "ALL-PSX-NO-DS34"
            psx_profile: "psx"
            pad_profile: "no-ds34"
            storage_profile: "all"
          - variant_name: "ALL-PSX-DS34"
            psx_profile: "psx"
            pad_profile: "ds34"
            storage_profile: "all"
    runs-on: ubuntu-latest
    # Pinned to ps2dev/ps2dev:v2.0.0 (2026-05-17); latest moved and changed runtime behavior.
    container: ps2dev/ps2dev@sha256:8e6dc4564598ecce94d078d3111b8c4803f88faa94a6f183ac60240a0ae010a1
    steps:

    - name: Install dependencies
      run: |
        if command -v apk >/dev/null 2>&1; then
          apk add --no-cache make git zip gcc musl-dev gmp mpfr4 mpc1
        elif command -v apt-get >/dev/null 2>&1; then
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y make git zip gcc libc6-dev libgmp10 libmpfr6 libmpc3
        else
          echo "No supported package manager found for dependency install." >&2
          exit 1
        fi

    - name: Verify toolchain runtime libs
      run: |
        cc1_path="$(mips64r5900el-ps2-elf-gcc -print-prog-name=cc1)"
        if [ -x "$cc1_path" ]; then
          ldd "$cc1_path"
        fi
        mips64r5900el-ps2-elf-gcc --version

    - uses: actions/checkout@v6
    - run: |
        git config --global --add safe.directory "$GITHUB_WORKSPACE"
        git fetch --prune --unshallow
    - name: Prepare PS2SDK source for local vmcman build
      run: |
        if [ -n "${PS2SDKSRC:-}" ] && [ -f "$PS2SDKSRC/Defs.make" ] && [ -f "$PS2SDKSRC/iop/Rules.make" ]; then
          echo "Using PS2SDKSRC=$PS2SDKSRC"
          exit 0
        fi
        if [ -n "${PS2SDK:-}" ] && [ -f "$PS2SDK/Defs.make" ] && [ -f "$PS2SDK/iop/Rules.make" ]; then
          echo "Using PS2SDK source tree at $PS2SDK"
          echo "PS2SDKSRC=$PS2SDK" >> "$GITHUB_ENV"
          exit 0
        fi
        ps2sdk_src_dir="${RUNNER_TEMP:-/tmp}/ps2sdk-src"
        git clone --depth 1 https://github.com/ps2dev/ps2sdk.git "$ps2sdk_src_dir"
        echo "PS2SDKSRC=$ps2sdk_src_dir" >> "$GITHUB_ENV"
    - name: Ensure scripts are executable
      run: |
        chmod +x scripts/stale_code_audit.sh scripts/ci/resolve_make_args.sh

    - name: Compile wLaunchELF
      run: |
        FLAGS="$(scripts/ci/resolve_make_args.sh \
          "${{ matrix.psx_profile }}" \
          "${{ matrix.pad_profile }}" \
          "${{ matrix.storage_profile }}" \
          0 0)"
        echo "Resolved make flags: $FLAGS"
        make rebuild ${{ github.event.inputs.make_args }} $FLAGS

    - name: Verify loader low-memory layout guard
      run: |
        make -C loader check-layout DEBUG=0

    - name: Rename output ELF for variant
      run: |
        set -- BOOT*.ELF
        if [ "$1" = 'BOOT*.ELF' ]; then
          echo "No BOOT*.ELF produced by build." >&2
          exit 1
        fi
        cp "$1" "wLE-${{ matrix.variant_name }}.ELF"

    - name: Upload variants artifact ELF
      uses: actions/upload-artifact@v7
      with:
        name: "WLE-${{ matrix.variant_name }}"
        path: |
            wLE-${{ matrix.variant_name }}.ELF

####################################################### 
  release:
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
    steps:

    - uses: actions/checkout@v6
    - run: |
        git config --global --add safe.directory "$GITHUB_WORKSPACE"
        git fetch --prune --unshallow

    - name: Download all artifacts
      uses: actions/download-artifact@v7
      with:
        path: WLE/
        pattern: "WLE-ALL-*"

    - name: list
      run: |
        ls -R

    - name: Publish latest automated build release
      if: github.ref == 'refs/heads/master'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        tag="latest"
        title="Latest automated build"

        if gh release view "$tag" >/dev/null 2>&1; then
          gh release edit "$tag" --title "$title"
        else
          gh release create "$tag" --title "$title" --notes "Automated build for ${GITHUB_SHA}" --target "${GITHUB_SHA}"
        fi

        mapfile -d '' assets < <(find WLE -type f -name '*.ELF' -print0)
        if [ "${#assets[@]}" -eq 0 ]; then
          echo "No ELF assets found under WLE/." >&2
          exit 1
        fi
        gh release upload "$tag" "${assets[@]}" --clobber

    - name: Publish language files release
      if: github.ref == 'refs/heads/master'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        tag="language-files"
        title="Translations"

        if gh release view "$tag" >/dev/null 2>&1; then
          gh release edit "$tag" --title "$title"
        else
          gh release create "$tag" --title "$title" --notes "Automated language files for ${GITHUB_SHA}" --target "${GITHUB_SHA}"
        fi

        mapfile -d '' assets < <(find Lang -type f -name '*.LNG' -print0)
        if [ "${#assets[@]}" -eq 0 ]; then
          echo "No language assets found under Lang/." >&2
          exit 1
        fi
        gh release upload "$tag" "${assets[@]}" --clobber

  trigger-auto-update:
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [release]
    strategy:
      matrix:
        include:
          - repo: israpps/FreeMcBoot-Installer
            enabled: false
          - repo: israpps/Funtuna-Fork
            enabled: false
          - repo: israpps/PlayStation2-Basic-BootLoader
            enabled: false
    steps:
    - name: trigger israpps auto-update system
      if: ${{ (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') && matrix.enabled }}
      uses: peter-evans/repository-dispatch@v1
      with:
          token: ${{ secrets.IUS }}
          repository: ${{ matrix.repo }} 
          event-type: Component_update
          client-payload: '{"sha": "${{ github.sha }}"}'
    - name: auto-update disabled for target
      if: ${{ !matrix.enabled }}
      run: echo "Auto-update dispatch disabled for ${{ matrix.repo }}."
